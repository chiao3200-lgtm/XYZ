<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>同頻訊號攔截中…</title>
    <style>
        :root {
            --neon-cyan: #00f3ff;
            --neon-pink: #ff00ff;
            --book-orange: #ff7b00;
            --book-orange-dark: #cc5500;
            --bg-dynamic: #000;
            --text-dynamic: #fff;
            --book-w: clamp(260px, 85vw, 320px);
            --book-h: calc(var(--book-w) * 1.42);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body, html { 
            width: 100%; height: 100%; 
            font-family: 'Orbitron', 'Noto Sans TC', sans-serif; 
            background-color: var(--bg-dynamic); color: var(--text-dynamic);
            overflow: hidden; touch-action: manipulation;
            transition: background-color 0.5s ease, color 0.5s ease;
        }

        /* --- 日夜切換按鈕 --- */
        #theme-toggle {
            position: fixed; top: 20px; right: 20px; z-index: 1000;
            background: transparent; border: 1px solid var(--book-orange);
            color: inherit; padding: 10px 15px; cursor: pointer;
            font-family: 'Orbitron'; font-size: 0.7rem; letter-spacing: 2px;
            backdrop-filter: blur(10px); transition: 0.3s;
        }
        #theme-toggle:hover { background: var(--book-orange); color: #000; }

        /* --- 1. 進場層佈局 --- */
        #intro-layer { 
            position: fixed; inset: 0; z-index: 100; 
            display: flex; flex-direction: column; 
            justify-content: center; align-items: center; 
            background: transparent; transition: opacity 0.8s;
            text-align: center;
            padding: 20px;
        }

        /* 蘋果圖片樣式：位於文字上方 */
        #apple-logo {
            height: 40vh; /* 桌面端高度比例 */
            width: auto;
            max-width: 80vw;
            object-fit: contain;
            margin-bottom: 30px; /* 與文字的間距 */
            opacity:1.0;
            transition: all 0.8s ease;
            filter: drop-shadow(0 0 20px rgba(255,255,255,0.1));
        }

        .slogan { 
            font-size: clamp(1.1rem, 5vw, 1.8rem); 
            letter-spacing: 0.3rem; 
            color: inherit; 
            font-weight: bold; 
            min-height: 1.5em;
        }

        /* 行動端比例優化 */
        @media (max-height: 700px) {
            #apple-logo {
                height: 25vh;
                margin-bottom: 20px;
            }
        }

        .enter-btn { 
            display: none; margin-top: 40px; padding: 18px 50px; 
            background: var(--book-orange); color: #000; border: none; 
            cursor: pointer; letter-spacing: 4px; transition: 0.3s; 
            box-shadow: 0 0 25px var(--book-orange); 
            font-family: 'Orbitron'; font-weight: 900;
            text-transform: uppercase;
        }
        .enter-btn:hover { background: #fff; color: var(--book-orange); box-shadow: 0 0 40px #fff; transform: scale(1.05); }

        .cursor { display: inline-block; width: 8px; height: 1.2em; background: currentColor; margin-left: 5px; animation: blink 0.7s infinite; vertical-align: middle; }
        @keyframes blink { 50% { opacity: 0; } }

        /* --- 遊戲與書籍介面 (維持原邏輯) --- */
        #rule-modal { display: none; position: fixed; inset: 0; z-index: 150; background: rgba(0,0,0,0.95); justify-content: center; align-items: center; padding: 20px; }
        .rule-content { max-width: 480px; width: 100%; background: #0f0f12; border: 1px solid var(--book-orange); padding: 40px; }
        
        #radio-screen { display: none; width: 100%; height: 100%; justify-content: center; align-items: center; z-index: 200; background: #050507; color: #fff; }
        .cyber-chassis { width: 100%; max-width: 440px; background: #1a1a22; border: 1px solid #333; padding: 20px; border-top: 4px solid var(--book-orange); }
        
        #final-reveal { display: none; position: fixed; inset: 0; z-index: 500; background: #050507; flex-direction: column; justify-content: center; align-items: center; padding: 20px; transition: 1s; }
        .book { position: relative; width: var(--book-w); height: var(--book-h); perspective: 2500px; }
        .page { position: absolute; width: 100%; height: 100%; transform-origin: left center; transition: 0.9s; transform-style: preserve-3d; }
        .page-side { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; flex-direction: column; padding: 30px; border: 1px solid #333; }
        .page-front { background: #fff; color: #000; z-index: 2; }
        .page-back { background: #fdfdfd; transform: rotateY(-180deg); }
        .page.flipped { transform: rotateY(-180deg); }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Noto+Sans+TC:wght@300;700&display=swap" rel="stylesheet">
</head>
<body>

    <button id="theme-toggle" onclick="toggleTheme()">DIMENSION: DAY</button>

    <div id="intro-layer">
        <!-- 蘋果圖樣：位於文字上方 -->
        <img src="img/BG_apple.PNG" id="apple-logo" alt="Iridescent Apple">
        
        <div class="slogan">
            <span id="type-text"></span><span id="cursor" class="cursor"></span>
        </div>
        
        <button id="start-btn" class="enter-btn" onclick="showRules()">Initialize System</button>
    </div>

    <!-- 規則說明介面 -->
    <div id="rule-modal">
        <div class="rule-content">
            <h2 style="color:var(--book-orange); margin-bottom:20px;">維度通訊玩具：已啟動</h2>
            <p style="color:#ccc; line-height:1.8; margin-bottom:30px;">
                你在舊紙箱中發現了這顆虹彩蘋果，它似乎是某種跨維度的接收器...<br><br>
                撥動下方頻率拉桿，當畫面產生視覺震動時，代表你正在接近通訊波長。
            </p>
            <button class="enter-btn" style="display:block; width:100%; background: var(--book-orange); color:#000;" onclick="startGame()">開始同步訊號</button>
        </div>
    </div>

    <!-- 遊戲收音機介面 -->
    <div id="radio-screen">
        <div class="cyber-chassis">
            <div style="background:#000; padding:15px; text-align:center; margin-bottom:15px; border:1px solid #333;">
                <span id="freq-num" style="font-family:monospace; font-size:2rem; color:var(--book-orange);">---.-</span>
            </div>
            <div id="viewport" style="width:100%; aspect-ratio:4/3; background:#000; position:relative; overflow:hidden; border:2px solid #111;">
                <img src="" id="main-img" style="width:100%; height:100%; object-fit:cover; opacity:0; filter:blur(30px);">
                <div id="lock-msg" style="position:absolute; inset:0; display:none; justify-content:center; align-items:center; background:rgba(255,123,0,0.2); font-weight:bold;">SIGNAL LOCKED</div>
            </div>
            <input type="range" id="radio-slider" min="88.0" max="108.0" step="0.1" value="88.0" style="width:100%; margin-top:25px;">
            <div class="slots" style="display:grid; grid-template-columns:repeat(6,1fr); gap:5px; margin-top:20px;">
                <div class="slot" id="slot-0" style="aspect-ratio:1; background:#08080a; border:1px solid #333;"></div>
                <div class="slot" id="slot-1" style="aspect-ratio:1; background:#08080a; border:1px solid #333;"></div>
                <div class="slot" id="slot-2" style="aspect-ratio:1; background:#08080a; border:1px solid #333;"></div>
                <div class="slot" id="slot-3" style="aspect-ratio:1; background:#08080a; border:1px solid #333;"></div>
                <div class="slot" id="slot-4" style="aspect-ratio:1; background:#08080a; border:1px solid #333;"></div>
                <div class="slot" id="slot-5" style="aspect-ratio:1; background:#08080a; border:1px solid #333;"></div>
            </div>
        </div>
    </div>

    <!-- 結局書籍展示 -->
    <div id="final-reveal">
        <div class="book" id="book-container">
            <!-- 封面 -->
            <div class="page" id="p0" style="z-index:20">
                <div class="page-side page-front" style="background:var(--book-orange); color:#fff; justify-content:center; align-items:center; border-left:5px solid #441100;" onclick="nextPage(0)">
                    <h1 style="text-align:center;">晝夜同頻企劃</h1>
                    <p style="margin-top:20px; opacity:0.6;">// SUCCESS //</p>
                </div>
                <div class="page-side page-back" onclick="prevPage(0)"></div>
            </div>
            <!-- 作者頁 -->
            <div id="dynamic-pages"></div>
            <!-- 封底 -->
            <div class="page" id="pLast" style="z-index:11">
                <div class="page-side page-front" style="background:var(--book-orange-dark); color:#fff; justify-content:center; align-items:center;" onclick="startFoolSequence()">
                    <h3>2066/4/01</h3>
                    <p style="margin-top:20px;">點擊解鎖預購連結</p>
                </div>
                <div class="page-side page-back" onclick="prevPage('Last')"></div>
            </div>
        </div>
    </div>

    <script>
        const authorConfig = [
            { name: "Eros艾諾斯", img: "img/author4.png" },
            { name: "子葉", img: "img/author3.jpg" },
            { name: "陌那", img: "img/author6.png" },
            { name: "飯粒", img: "img/author2.png" },
            { name: "蒼斐", img: "img/author1.png" },
            { name: "31棵棕櫚樹", img: "img/author5.jpg", fixed: 1031 }
        ];

        let targets = [], found = new Set(), locked = false, isDayGlobal = true;
        const imgs = authorConfig.map(a => a.img);
        const zMap = { '0': 20, 'Auth0': 19, 'Auth1': 18, 'Auth2': 17, 'Auth3': 16, 'Auth4': 15, 'Auth5': 14, 'Last': 11 };

        (function init() {
            const h = new Date().getHours();
            isDayGlobal = h >= 6 && h < 18;
            window.addEventListener('DOMContentLoaded', () => {
                applyTheme(isDayGlobal);
                startTypewriter("type-text", "同頻訊號攔截中…", () => {
                    setTimeout(() => {
                        document.getElementById('type-text').innerHTML = "訊號已攔截成功。";
                        document.getElementById('cursor').style.display = "none";
                        document.getElementById('start-btn').style.display = "block";
                    }, 1000);
                });
                generateFrequencies();
                setupDynamicPages();
            });
        })();

        function applyTheme(isDay) {
            isDayGlobal = isDay;
            document.documentElement.style.setProperty('--bg-dynamic', isDay ? '#000' : '#fff');
            document.documentElement.style.setProperty('--text-dynamic', isDay ? '#fff' : '#000');
            document.getElementById('theme-toggle').innerText = `DIMENSION: ${isDay ? 'DAY' : 'NIGHT'}`;
            
            const apple = document.getElementById('apple-logo');
            if(isDay) {
                apple.style.filter = "drop-shadow(0 0 20px rgba(255,255,255,0.1))";
            } else {
                apple.style.filter = "brightness(0.8) contrast(1.1) drop-shadow(0 0 20px rgba(0,0,0,0.1))";
            }
        }

        function toggleTheme() { applyTheme(!isDayGlobal); }

        function showRules() {
            document.getElementById('intro-layer').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('intro-layer').style.display = 'none';
                document.getElementById('rule-modal').style.display = 'flex';
            }, 800);
        }

        function startGame() {
            document.getElementById('rule-modal').style.display = 'none';
            document.getElementById('radio-screen').style.display = 'flex';
            document.body.style.backgroundColor = "#050507";
            const freq = (Math.random() * (108 - 88) + 88).toFixed(1);
            document.getElementById('radio-slider').value = freq;
            updateUI(freq);
        }

        document.getElementById('radio-slider').addEventListener('input', (e) => { if(!locked) updateUI(e.target.value); });

        function updateUI(val) {
            const fNum = parseFloat(val);
            document.getElementById('freq-num').innerText = fNum.toFixed(1).padStart(5, '0');
            let minDist = 1000, idx = -1;
            targets.forEach((t, i) => { let d = Math.abs(fNum * 10 - t); if(d < minDist) { minDist = d; idx = i; } });
            const img = document.getElementById('main-img');
            if(minDist < 12) {
                img.src = imgs[idx]; img.style.opacity = (1 - minDist/12);
                img.style.filter = `blur(${minDist * 2}px) contrast(120%)`;
                if(minDist === 0 && !found.has(idx)) capture(idx);
            } else { img.style.opacity = "0.05"; img.style.filter = "blur(40px)"; }
        }

        function capture(idx) {
            locked = true; found.add(idx);
            const mainImg = document.getElementById('main-img');
            mainImg.style.filter = "blur(0px)"; mainImg.style.opacity = "1";
            document.getElementById('lock-msg').style.display = "flex";
            setTimeout(() => {
                document.getElementById('lock-msg').style.display = "none";
                document.getElementById(`slot-${idx}`).innerHTML = `<img src="${imgs[idx]}" style="width:100%;height:100%;object-fit:cover;">`;
                locked = false;
                if(found.size === 6) triggerEnd();
            }, 1200);
        }

        function triggerEnd() {
            setTimeout(() => {
                document.getElementById('radio-screen').style.display = 'none';
                document.getElementById('final-reveal').style.display = 'flex';
                setTimeout(() => document.getElementById('final-reveal').style.opacity = '1', 50);
            }, 1000);
        }

        function startFoolSequence() {
            alert("愚人節快樂！本訊號來自 2066 年，當前時空尚未解鎖預購。");
        }

        function setupDynamicPages() {
            const container = document.getElementById('dynamic-pages');
            authorConfig.forEach((auth, i) => {
                const page = document.createElement('div');
                page.className = 'page'; page.id = `pAuth${i}`; page.style.zIndex = zMap[`Auth${i}`];
                page.innerHTML = `
                    <div class="page-side page-front" onclick="nextPage('Auth${i}')">
                        <div style="margin:auto; text-align:center;">
                            <div style="width:120px; height:160px; background:#eee; margin:0 auto 15px; border:1px solid #ccc; overflow:hidden;">
                                <img src="${auth.img}" style="width:100%; height:100%; object-fit:cover;">
                            </div>
                            <h3 style="font-family:Noto Sans TC;">${auth.name}</h3>
                        </div>
                    </div>
                    <div class="page-side page-back" onclick="prevPage('Auth${i}')"></div>`;
                container.appendChild(page);
            });
        }

        function generateFrequencies() {
            targets = [];
            authorConfig.forEach((auth, i) => {
                let r; do { r = Math.floor(Math.random() * (1080 - 880 + 1) + 880); } while (targets.includes(r));
                targets[i] = r;
            });
        }

        function startTypewriter(id, text, cb) {
            let i = 0, el = document.getElementById(id);
            const t = setInterval(() => { el.innerHTML += text[i++]; if(i >= text.length) { clearInterval(t); if(cb) cb(); } }, 120);
        }

        function nextPage(id) { const p = document.getElementById('p'+id); p.classList.add('flipped'); setTimeout(() => p.style.zIndex = 1, 500); }
        function prevPage(id) { 
            const p = document.getElementById('p'+id); 
            const realId = id.includes('Auth') ? id : id;
            p.style.zIndex = zMap[id]; 
            p.classList.remove('flipped'); 
        }
    </script>
</body>
</html>
