<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>同頻訊號攔截中…</title>
    <style>
        :root {
            --neon-cyan: #00f3ff;
            --neon-pink: #ff00ff;
            --bg-dark: #0a0a0c;
            --book-width: 260px;
            --book-height: 360px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body, html {
            width: 100%; height: 100%;
            font-family: 'Orbitron', 'Noto Sans TC', sans-serif;
            background-color: var(--bg-dark);
            color: #fff; overflow: hidden;
        }

        /* --- 背景層 --- */
        #bg-canvas { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            z-index: 1; pointer-events: none; 
        }
        .star { 
            position: absolute; background: #fff; border-radius: 50%; 
            animation: twinkle var(--d) infinite ease-in-out; 
        }
        .cloud { 
            position: absolute; background: rgba(255,255,255,0.5); 
            filter: blur(40px); border-radius: 50%; 
            animation: drift var(--d) linear infinite; 
        }
        @keyframes twinkle { 0%, 100% { opacity: 0.2; transform: scale(1); } 50% { opacity: 1; transform: scale(1.2); } }
        @keyframes drift { from { transform: translateX(-350px); } to { transform: translateX(calc(100vw + 350px)); } }

        /* --- 第一階段：進場（打字機與干擾） --- */
        #intro-layer {
            position: fixed; inset: 0; z-index: 100;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: rgba(0,0,0,0.9); backdrop-filter: blur(10px);
            transition: opacity 1s;
        }

        /* 電磁干擾掃描線 */
        .glitch-overlay {
            position: absolute; inset: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 3px, 2px 100%;
            pointer-events: none; z-index: 101;
        }

        .slogan {
            font-size: clamp(1.4rem, 6vw, 2.2rem);
            letter-spacing: 0.3rem; text-align: center;
            color: var(--neon-cyan);
            text-shadow: 0 0 10px var(--neon-cyan);
            z-index: 102;
            position: relative;
        }

        .cursor {
            display: inline-block; width: 12px; height: 1.2em;
            background: var(--neon-cyan); margin-left: 8px;
            animation: blink 0.7s infinite; vertical-align: middle;
        }
        @keyframes blink { 50% { opacity: 0; } }

        .enter-btn {
            display: none; margin-top: 50px;
            padding: 15px 40px; font-size: 1rem;
            background: transparent; color: #fff;
            border: 2px solid var(--neon-cyan); cursor: pointer;
            text-transform: uppercase; letter-spacing: 4px;
            box-shadow: 0 0 15px var(--neon-cyan);
            z-index: 103; transition: 0.3s;
            animation: fadeIn 0.8s forwards;
        }
        .enter-btn:hover { background: var(--neon-cyan); color: #000; box-shadow: 0 0 40px var(--neon-cyan); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* --- 第二階段：遊戲面板 --- */
        #radio-screen { 
            display: none; width: 100%; height: 100%; 
            justify-content: center; align-items: center; z-index: 10;
        }
        .cyber-panel { 
            width: 90%; max-width: 450px; background: rgba(15, 15, 20, 0.95); 
            border: 1px solid #333; padding: 20px; position: relative; 
            border-top: 4px solid var(--neon-cyan);
        }
        .freq-display { background: #000; padding: 10px; margin-bottom: 15px; text-align: center; border: 1px solid #222; }
        #freq-num { font-size: 3rem; font-weight: bold; color: var(--neon-cyan); font-family: monospace; }
        
        .viewport { 
            width: 100%; aspect-ratio: 4/3; background: #000; 
            position: relative; overflow: hidden; border: 1px solid #444; 
        }
        #main-img { 
            width: 100%; height: 100%; object-fit: cover; opacity: 0; 
            filter: blur(20px); transition: filter 0.1s; background: #111; 
        }
        .noise { 
            position: absolute; inset: 0; background: url('https://media.giphy.com/media/oEI9uWUPr9WUM/giphy.gif'); 
            opacity: 0.1; pointer-events: none; z-index: 5; mix-blend-mode: screen;
        }

        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .nav-btn { 
            padding: 12px; background: #111; border: 1px solid var(--neon-cyan); 
            color: var(--neon-cyan); cursor: pointer; font-weight: bold;
        }
        .nav-btn:active { background: var(--neon-cyan); color: #000; }

        .slots { display: grid; grid-template-columns: repeat(6, 1fr); gap: 5px; margin-top: 15px; }
        .slot { aspect-ratio: 1; border: 1px solid #222; background: #0a0a0a; position: relative; overflow: hidden; }
        .slot.active { border-color: var(--neon-cyan); box-shadow: 0 0 10px var(--neon-cyan); }
        .slot img { width: 100%; height: 100%; object-fit: cover; }

        #lock-notice { 
            position: absolute; inset: 0; display: none; justify-content: center; align-items: center; 
            background: rgba(0, 243, 255, 0.2); z-index: 20; font-weight: bold; font-size: 1.2rem;
        }

        /* --- 第三階段：翻頁書 --- */
        #final-reveal { 
            display: none; position: fixed; inset: 0; z-index: 2000; 
            background: #000; flex-direction: column; justify-content: center; 
            align-items: center; opacity: 0; transition: 1s; padding: 20px;
        }
        .book-wrapper { perspective: 1200px; width: var(--book-width); height: var(--book-height); margin-bottom: 30px; }
        .book { position: relative; width: 100%; height: 100%; transform-style: preserve-3d; transition: 0.6s; cursor: pointer; }
        .page { 
            position: absolute; inset: 0; transform-origin: left; transition: 0.8s; 
            backface-visibility: hidden; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; padding: 20px; border: 1px solid #333;
        }
        .front { background: linear-gradient(45deg, #050505, #1a1a1a); z-index: 2; border-left: 4px solid var(--neon-cyan); }
        .back { background: #fff; color: #000; transform: rotateY(0deg); z-index: 1; }
        .last { background: #000; color: var(--neon-pink); border: 2px solid var(--neon-pink); text-align: center; }
        
        .book.flipped .front { transform: rotateY(-160deg); }
        .book.flipped .back { z-index: 3; }

        .book-info { text-align: center; max-width: 400px; }
        .book-info h2 { color: var(--neon-cyan); margin-bottom: 10px; }
        .book-info p { font-size: 0.9rem; color: #aaa; margin-bottom: 5px; }

        .fly-img { position: fixed; z-index: 999; object-fit: cover; transition: 0.7s cubic-bezier(0.6, -0.28, 0.735, 0.045); }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Noto+Sans+TC:wght@300;700&display=swap" rel="stylesheet">
</head>
<body>

    <div id="bg-canvas"></div>

    <!-- 1. 打字機開場層 -->
    <div id="intro-layer">
        <div class="glitch-overlay"></div>
        <div class="slogan"><span id="type-text"></span><span id="cursor" class="cursor"></span></div>
        <button id="start-btn" class="enter-btn" onclick="startGame()">INITIALIZE SYSTEM</button>
    </div>

    <!-- 2. 收音機面板 -->
    <div id="radio-screen">
        <div class="cyber-panel">
            <div class="freq-display"><div id="freq-num">088.0</div></div>
            <div class="viewport" id="viewport">
                <div class="noise"></div>
                <img src="" id="main-img">
                <div id="lock-notice">SIGNAL LOCKED</div>
            </div>
            <div class="controls">
                <button class="nav-btn" onmousedown="startScan(-1)" onmouseup="stopScan()" ontouchstart="startScan(-1)" ontouchend="stopScan()">◀ DOWN</button>
                <button class="nav-btn" onmousedown="startScan(1)" onmouseup="stopScan()" ontouchstart="startScan(1)" ontouchend="stopScan()">UP ▶</button>
            </div>
            <div class="slots" id="slots-grid">
                <div class="slot" id="slot-0"></div><div class="slot" id="slot-1"></div><div class="slot" id="slot-2"></div>
                <div class="slot" id="slot-3"></div><div class="slot" id="slot-4"></div><div class="slot" id="slot-5"></div>
            </div>
        </div>
    </div>

    <!-- 3. 翻頁書結局 -->
    <div id="final-reveal">
        <div class="book-wrapper">
            <div class="book" id="book" onclick="this.classList.toggle('flipped')">
                <div class="page front">
                    <h2 style="color:var(--neon-cyan)">晝夜同頻</h2>
                    <p style="margin-top:20px; font-size:0.8rem; color:#666;">點擊翻閱</p>
                </div>
                <div class="page back">
                    <h3 style="margin-bottom:10px;">序章</h3>
                    <p style="font-size:0.8rem; line-height:1.5;">攔截成功的數據殘片。這本記錄了關於維度與頻率的詩篇...</p>
                    <p style="margin-top:20px; font-size:0.7rem; color:var(--neon-pink);">(再次點擊查看封底)</p>
                </div>
                <div class="page last" style="transform: rotateY(-180deg); backface-visibility: visible; z-index:0;">
                    <p style="padding:20px; line-height:1.8;">訊號連接成功，<br>但這...真的會是<br>愚人節玩笑嗎？</p>
                </div>
            </div>
        </div>
        <div class="book-info">
            <h2>晝夜同頻</h2>
            <p>尺寸: A5 / 頁數: 約 70P / 裝訂: 軟精裝</p>
            <button class="enter-btn" style="display:inline-block; margin-top:20px;" onclick="location.reload()">RESCAN</button>
        </div>
    </div>

    <script>
        // --- 初始化變數 ---
        const typeTarget = document.getElementById('type-text');
        const startBtn = document.getElementById('start-btn');
        const cursor = document.getElementById('cursor');
        const bgCanvas = document.getElementById('bg-canvas');

        // --- 1. 背景與打字機啟動 ---
        document.addEventListener('DOMContentLoaded', () => {
            initBackground();
            startSequence();
        });

        function initBackground() {
            const isDay = new Date().getHours() >= 6 && new Date().getHours() < 18;
            if(isDay) {
                document.body.style.backgroundColor = "#000";
                for(let i=0; i<60; i++) createStar();
            } else {
                document.body.style.backgroundColor = "#eee";
                bgCanvas.style.filter = "invert(1)";
                for(let i=0; i<8; i++) createCloud();
            }
        }

        function createStar() {
            const s = document.createElement('div'); s.className = 'star';
            s.style.left = Math.random()*100+'vw'; s.style.top = Math.random()*100+'vh';
            const size = Math.random()*3+'px'; s.style.width = s.style.height = size;
            s.style.setProperty('--d', Math.random()*3+2+'s');
            bgCanvas.appendChild(s);
        }

        function createCloud() {
            const c = document.createElement('div'); c.className = 'cloud';
            c.style.width = Math.random()*200+100+'px'; c.style.height = '80px';
            c.style.top = Math.random()*100+'vh'; c.style.left = '-300px';
            c.style.setProperty('--d', Math.random()*15+10+'s');
            bgCanvas.appendChild(c);
        }

        function startSequence() {
            let text = "同頻訊號攔截…";
            let i = 0;
            const timer = setInterval(() => {
                typeTarget.innerHTML += text[i];
                i++;
                if(i >= text.length) {
                    clearInterval(timer);
                    setTimeout(() => {
                        typeTarget.innerHTML = "訊號已攔截成功。";
                        cursor.style.display = "none";
                        startBtn.style.display = "block";
                    }, 1000);
                }
            }, 150);
        }

        // --- 2. 遊戲邏輯 ---
        let freq = 880;
        let scanTimer;
        let locked = false;
        const targets = [895, 920, 954, 1001, 1031, 1077];
        const imgs = ["img/author1.png", "img/author2.png", "img/author3.jpg", "img/author4.png", "img/author5.jpg", "img/author6.png"];
        const found = new Set();

        function startGame() {
            document.getElementById('intro-layer').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('intro-layer').style.display = 'none';
                document.getElementById('radio-screen').style.display = 'flex';
                document.body.style.backgroundColor = "#0a0a0c";
                bgCanvas.style.filter = "none";
            }, 1000);
        }

        function startScan(dir) {
            if(locked) return;
            scanTimer = setInterval(() => {
                freq += dir;
                if(freq > 1080) freq = 880;
                if(freq < 880) freq = 1080;
                updateUI();
            }, 80);
        }
        function stopScan() { clearInterval(scanTimer); }

        function updateUI() {
            document.getElementById('freq-num').innerText = (freq/10).toFixed(1).padStart(5, '0');
            let minDist = 1000, idx = -1;
            targets.forEach((t, i) => {
                let d = Math.abs(freq - t);
                if(d < minDist) { minDist = d; idx = i; }
            });

            const mainImg = document.getElementById('main-img');
            if(minDist < 25) {
                mainImg.src = imgs[idx];
                mainImg.style.opacity = (1 - minDist/25);
                mainImg.style.filter = `blur(${minDist * 2}px)`;
                if(minDist === 0 && !found.has(idx)) capture(idx);
            } else {
                mainImg.style.opacity = "0.05"; mainImg.style.filter = "blur(30px)";
            }
        }

        function capture(idx) {
            locked = true; stopScan(); found.add(id
